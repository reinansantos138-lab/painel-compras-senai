<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Painel de Compras - SENAI CIMATEC</title>
  
  <!-- Tailwind CSS para Estilização -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- React e ReactDOM -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  
  <!-- Babel para compilar o JSX no navegador -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    body { font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; background-color: #f8fafc; }
    /* Estilos personalizados para inputs e scrollbar */
    ::-webkit-scrollbar { width: 8px; height: 8px; }
    ::-webkit-scrollbar-track { background: #f1f1f1; border-radius: 4px; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    // ==========================================
    // ÍCONES SVG (Substituindo dependências externas)
    // ==========================================
    const IconSearch = () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>;
    const IconPlus = () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>;
    const IconEdit = () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg>;
    const IconSave = () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"></path><polyline points="17 21 17 13 7 13 7 21"></polyline><polyline points="7 3 7 8 15 8"></polyline></svg>;
    const IconTrash = () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>;
    const IconX = () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>;
    const IconCheckCircle = () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>;
    const IconAlertCircle = () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg>;
    const IconLock = () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>;
    const IconUser = () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>;
    const IconFlask = () => <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M9 3h6"></path><path d="M10 3v4.36L5.23 18.06A2 2 0 0 0 6.96 21h10.08a2 2 0 0 0 1.73-2.94L14 7.36V3"></path><path d="M5 14h14"></path></svg>;
    const IconMicroscope = () => <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M6 18h8"></path><path d="M3 22h18"></path><path d="M14 22a7 7 0 1 0 0-14h-1"></path><path d="M9 14h2"></path><path d="M9 12a2 2 0 0 1-2-2V6h6v4a2 2 0 0 1-2 2Z"></path><path d="M12 6V3a1 1 0 0 0-1-1H9a1 1 0 0 0-1 1v3"></path></svg>;
    const IconBeaker = () => <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M4.5 3h15"></path><path d="M6 3v16a2 2 0 0 0 2 2h8a2 2 0 0 0 2-2V3"></path><path d="M6 14h12"></path></svg>;

    // ==========================================
    // LOGO SENAI CIMATEC
    // ==========================================
    const SenaiCimatecLogo = () => (
      <div className="flex justify-start items-center">
        <svg width="200" height="60" viewBox="0 0 200 60" fill="none" xmlns="http://www.w3.org/2000/svg">
          <g fill="#0B4EA2" style={{ fontFamily: 'system-ui, -apple-system, sans-serif', transform: 'skewX(-6deg)', transformOrigin: 'bottom left' }}>
            <text x="5" y="22" fontSize="15" fontWeight="800" letterSpacing="1.5">SENAI</text>
            <text x="4" y="52" fontSize="34" fontWeight="900" letterSpacing="0.5">CIMATEC</text>
          </g>
        </svg>
      </div>
    );

    // ==========================================
    // DADOS INICIAIS
    // ==========================================
    const initialData = {
      ESP: [
        { id: 1, item: 'Aquisição Nebulizadores alto STD', quantidade: '3', urgente: 'Não', dataSolicitacao: '2025-09-17', sc: 'SC 0208-10/2025', status: 'Aprovação/Homologação', ultimaAtualizacao: '2025-11-11', solicitante: 'Sheyla', concluido: 'N' },
        { id: 2, item: 'Aquisição Termo-higrômetro', quantidade: '4', urgente: 'Sim - AUDITORIA', dataSolicitacao: '2025-09-18', sc: 'SC 0209-10/2025', status: 'Contrato Ativo', ultimaAtualizacao: '2025-11-11', solicitante: 'Sheyla', concluido: 'S (24/11/25)' },
        { id: 3, item: 'Manutenção corretiva ICP-OES', quantidade: '1', urgente: 'Sim', dataSolicitacao: '2025-07-04', sc: 'SC 0276-10/2025', status: 'Concluído', ultimaAtualizacao: '2026-01-22', solicitante: 'Luiz Fernando', concluido: 'S (22/01/26)' }
      ],
      MIC: [
        { id: 4, item: 'Ágar MEI- Aquisição', quantidade: 'NA', urgente: 'SIM', dataSolicitacao: '2025-08-10', sc: '', status: 'Aguardando ADM', ultimaAtualizacao: '', solicitante: 'Alex', concluido: 'N' },
        { id: 5, item: 'Ágar M-FC- Aquisição', quantidade: 'NA', urgente: 'Sim - Auditoria', dataSolicitacao: '2025-08-12', sc: '', status: 'Em cotação', ultimaAtualizacao: '2025-08-15', solicitante: 'Alex', concluido: 'N' },
        { id: 6, item: 'Filtro / coluna -Aquisição', quantidade: 'NA', urgente: 'SIM - Auditoria', dataSolicitacao: '2025-08-20', sc: 'SC 0150-09/2025', status: 'Aprovado', ultimaAtualizacao: '2025-09-01', solicitante: 'Alex', concluido: 'P' }
      ],
      QGI: [
        { id: 7, item: 'Solução padrão de condutividade (5,0 µS/cm)', quantidade: '1', urgente: 'Auditoria', dataSolicitacao: '2025-01-24', sc: 'Aguardando SEDE', status: 'Em cadastro', ultimaAtualizacao: '2025-12-08', solicitante: 'Equipe QGI', concluido: 'N' },
        { id: 8, item: 'Placas aquecedora para extrator tipo SOXLEHT', quantidade: '2', urgente: 'Não', dataSolicitacao: '2025-10-27', sc: 'SC 0237-12/2025', status: 'Em planejamento', ultimaAtualizacao: '2025-12-08', solicitante: 'Equipe QGI', concluido: 'N' }
      ]
    };

    // ==========================================
    // COMPONENTE PRINCIPAL
    // ==========================================
    function App() {
      const [activeSector, setActiveSector] = useState('ESP');
      const [data, setData] = useState(initialData);
      const [editingId, setEditingId] = useState(null);
      const [editFormData, setEditFormData] = useState({});
      const [searchTerm, setSearchTerm] = useState('');
      
      // Controle de Perfil
      const [role, setRole] = useState('Tecnico'); // 'Tecnico' ou 'ADM'
      const [showAuthModal, setShowAuthModal] = useState(false);
      const [authPassword, setAuthPassword] = useState('');
      const [authError, setAuthError] = useState('');

      const sectors = [
        { id: 'ESP', name: 'Setor ESP', icon: <IconFlask /> },
        { id: 'MIC', name: 'Setor MIC', icon: <IconMicroscope /> },
        { id: 'QGI', name: 'Setor QGI', icon: <IconBeaker /> }
      ];

      // === FUNÇÕES DE AUTENTICAÇÃO ===
      const handleRoleChangeRequest = (newRole) => {
        if (newRole === 'ADM' && role !== 'ADM') {
          setShowAuthModal(true);
          setAuthPassword('');
          setAuthError('');
        } else {
          setRole('Tecnico');
        }
      };

      const authenticateAdm = () => {
        if (authPassword === 'adm2026') {
          setRole('ADM');
          setShowAuthModal(false);
          setAuthPassword('');
          setAuthError('');
        } else {
          setAuthError('Senha incorreta! Tente novamente.');
        }
      };

      // === FUNÇÕES DE TABELA ===
      const handleEdit = (item) => {
        setEditingId(item.id);
        setEditFormData(item);
      };

      const handleCancelEdit = () => {
        setEditingId(null);
        setEditFormData({});
      };

      const handleChange = (e) => {
        const { name, value } = e.target;
        setEditFormData({ ...editFormData, [name]: value });
      };

      const handleSave = () => {
        const updatedData = { ...data };
        const sectorData = updatedData[activeSector];
        const index = sectorData.findIndex(item => item.id === editingId);
        
        const dataAtual = new Date().toISOString().split('T')[0];
        const finalData = { ...editFormData };
        
        if (role === 'ADM' && index !== -1) {
          if (sectorData[index].status !== finalData.status || sectorData[index].sc !== finalData.sc) {
            finalData.ultimaAtualizacao = dataAtual;
          }
        }

        if (index !== -1) {
          sectorData[index] = finalData;
        } else {
          sectorData.unshift({ ...finalData, id: Date.now() });
        }
        
        setData(updatedData);
        setEditingId(null);
        setEditFormData({});
      };

      const handleDelete = (id) => {
        // Como o alert/confirm nativo bloqueia o iFrame em alguns ambientes, 
        // vamos usar window.confirm com fallback seguro ou uma exclusão direta no código de demonstração.
        if(window.confirm('Tem certeza que deseja excluir esta solicitação?')) {
          const updatedData = { ...data };
          updatedData[activeSector] = updatedData[activeSector].filter(item => item.id !== id);
          setData(updatedData);
        }
      };

      const handleAddNew = () => {
        const newItem = {
          id: 'new', 
          item: '', quantidade: '', urgente: 'Não', dataSolicitacao: new Date().toISOString().split('T')[0],
          sc: '', status: 'Novo', ultimaAtualizacao: '', solicitante: '', concluido: 'N'
        };
        setEditingId('new');
        setEditFormData(newItem);
      };

      const filteredData = data[activeSector].filter(item => 
        item.item.toLowerCase().includes(searchTerm.toLowerCase()) ||
        item.sc.toLowerCase().includes(searchTerm.toLowerCase()) ||
        item.solicitante.toLowerCase().includes(searchTerm.toLowerCase())
      );

      // Renderização de Célula
      const renderCell = (item, fieldName, placeholder = '', type = 'text') => {
        const isEditing = editingId === item.id;
        const isAdmField = fieldName === 'sc' || fieldName === 'status' || fieldName === 'ultimaAtualizacao';
        const isHighlightAdm = isAdmField && role === 'ADM';
        
        if (isEditing) {
          const cellClass = `w-full text-sm border rounded p-1.5 focus:outline-none focus:ring-2 ${
            isHighlightAdm ? 'bg-blue-50 border-blue-400 focus:ring-blue-500' : 'border-gray-300 focus:ring-[#0B4EA2]'
          }`;

          if (fieldName === 'concluido') {
            return (
              <select name={fieldName} value={editFormData[fieldName] || ''} onChange={handleChange} className={cellClass}>
                <option value="N">Não (N)</option>
                <option value="S">Sim (S)</option>
                <option value="P">Parcial (P)</option>
                <option value="NA">N/A</option>
              </select>
            );
          }
          return (
            <input
              type={type}
              name={fieldName}
              value={editFormData[fieldName] || ''}
              onChange={handleChange}
              placeholder={placeholder}
              className={cellClass}
            />
          );
        }

        let value = item[fieldName];
        if (fieldName === 'status') {
          const statusColor = value.toLowerCase().includes('concluído') || value.toLowerCase().includes('ativo') ? 'bg-green-100 text-green-800 border-green-200' : 
                              value.toLowerCase().includes('aprovação') || value.toLowerCase().includes('aguardando') || value.toLowerCase().includes('cotação') ? 'bg-yellow-100 text-yellow-800 border-yellow-200' : 
                              'bg-gray-100 text-gray-800 border-gray-200';
          return <span className={`px-2 py-1 rounded-md border text-xs font-semibold ${statusColor}`}>{value || '-'}</span>;
        }
        if (fieldName === 'sc') {
          return <span className="font-bold text-[#0B4EA2]">{value || '-'}</span>;
        }
        if (fieldName === 'concluido') {
           return value.startsWith('S') ? <div className="flex justify-center text-green-600"><IconCheckCircle /></div> : 
                  value.startsWith('P') ? <div className="flex justify-center text-yellow-500"><IconAlertCircle /></div> : 
                  <span className="text-gray-400 font-bold mx-auto block text-center">{value || 'N'}</span>;
        }
        return <span className="text-sm text-gray-800">{value || '-'}</span>;
      };

      return (
        <div className="flex flex-col min-h-screen bg-[#f8fafc] font-sans relative">
          
          {/* ========================================== 
              MODAL DE AUTENTICAÇÃO ADM
              ========================================== */}
          {showAuthModal && (
            <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 p-4">
              <div className="bg-white rounded-xl shadow-2xl p-6 w-full max-w-sm">
                <div className="flex items-center gap-3 text-[#0B4EA2] mb-4 border-b pb-3">
                  <IconLock />
                  <h3 className="text-lg font-bold">Acesso Administrativo</h3>
                </div>
                
                <p className="text-sm text-gray-600 mb-4">Insira a senha para liberar os recursos da ADM.</p>
                
                <input 
                  type="password" 
                  placeholder="Senha" 
                  value={authPassword}
                  onChange={(e) => setAuthPassword(e.target.value)}
                  onKeyDown={(e) => e.key === 'Enter' && authenticateAdm()}
                  className="w-full border border-gray-300 rounded-lg px-4 py-2 focus:ring-2 focus:ring-[#0B4EA2] focus:outline-none mb-2"
                />
                
                {authError && <p className="text-red-500 text-xs font-semibold mb-3">{authError}</p>}

                <div className="flex justify-end gap-2 mt-5">
                  <button 
                    onClick={() => setShowAuthModal(false)}
                    className="px-4 py-2 text-gray-600 bg-gray-100 hover:bg-gray-200 rounded-lg text-sm font-medium transition"
                  >
                    Cancelar
                  </button>
                  <button 
                    onClick={authenticateAdm}
                    className="px-4 py-2 bg-[#0B4EA2] text-white hover:bg-blue-800 rounded-lg text-sm font-bold transition"
                  >
                    Entrar
                  </button>
                </div>
              </div>
            </div>
          )}

          {/* ========================================== 
              CABEÇALHO SUPERIOR
              ========================================== */}
          <header className="bg-white shadow-sm border-b border-gray-200 px-6 py-3 flex items-center justify-between sticky top-0 z-30">
            <SenaiCimatecLogo />
            
            {/* Seletor de Perfil no Topo */}
            <div className="flex items-center bg-gray-100 p-1 rounded-lg border border-gray-200">
              <button 
                onClick={() => handleRoleChangeRequest('Tecnico')}
                className={`flex items-center gap-2 px-4 py-2 text-sm font-bold rounded-md transition-all ${role === 'Tecnico' ? 'bg-white shadow-sm text-gray-800' : 'text-gray-500 hover:text-gray-700'}`}
              >
                <IconUser /> Técnico
              </button>
              <button 
                onClick={() => handleRoleChangeRequest('ADM')}
                className={`flex items-center gap-2 px-4 py-2 text-sm font-bold rounded-md transition-all ${role === 'ADM' ? 'bg-[#0B4EA2] text-white shadow-md' : 'text-gray-500 hover:text-gray-700'}`}
              >
                <IconLock /> ADM
              </button>
            </div>
          </header>

          <div className="flex-1 flex flex-col p-6 max-w-7xl mx-auto w-full">
            
            {/* ========================================== 
                SEÇÃO DOS CARDS CENTRAIS (MÓDULOS)
                ========================================== */}
            <div className="mb-8">
              <h2 className="text-2xl font-bold text-gray-800 mb-6 text-center">Selecione o Módulo de Acompanhamento</h2>
              <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                {sectors.map(sector => {
                  const isActive = activeSector === sector.id;
                  return (
                    <div 
                      key={sector.id}
                      onClick={() => { setActiveSector(sector.id); setEditingId(null); }}
                      className={`cursor-pointer rounded-2xl p-6 flex flex-col items-center justify-center gap-4 transition-all duration-300 border-2 shadow-sm transform hover:-translate-y-1 hover:shadow-lg ${
                        isActive 
                          ? 'bg-[#0B4EA2] border-[#0B4EA2] text-white' 
                          : 'bg-white border-gray-200 text-gray-600 hover:border-[#0B4EA2] hover:text-[#0B4EA2]'
                      }`}
                    >
                      <div className={`p-4 rounded-full ${isActive ? 'bg-white/20' : 'bg-gray-50'}`}>
                        {sector.icon}
                      </div>
                      <h3 className="text-xl font-black tracking-wide">{sector.name}</h3>
                      <p className={`text-xs ${isActive ? 'text-blue-200' : 'text-gray-400'}`}>
                        {data[sector.id].length} solicitações registradas
                      </p>
                    </div>
                  );
                })}
              </div>
            </div>

            {/* ========================================== 
                ÁREA DA TABELA
                ========================================== */}
            <div className="bg-white rounded-xl shadow-md border border-gray-200 overflow-hidden flex flex-col flex-1">
              
              {/* Barra de Ações da Tabela */}
              <div className="p-5 border-b border-gray-200 bg-gray-50 flex flex-col sm:flex-row items-center justify-between gap-4">
                <h3 className="text-lg font-bold text-gray-800">
                  Planilha de Pedidos - {activeSector}
                </h3>
                
                <div className="flex items-center gap-3 w-full sm:w-auto">
                  <div className="relative flex-1 sm:flex-none">
                    <div className="absolute left-3 top-1/2 transform -translate-y-1/2 text-gray-400"><IconSearch /></div>
                    <input 
                      type="text" 
                      placeholder="Buscar número SC ou item..." 
                      value={searchTerm}
                      onChange={(e) => setSearchTerm(e.target.value)}
                      className="pl-10 pr-4 py-2 w-full sm:w-72 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-[#0B4EA2]"
                    />
                  </div>
                  <button 
                    onClick={handleAddNew}
                    disabled={editingId === 'new'}
                    className="bg-[#0B4EA2] hover:bg-blue-800 disabled:bg-blue-300 text-white px-4 py-2 rounded-lg flex items-center gap-2 text-sm font-bold transition shadow-sm whitespace-nowrap"
                  >
                    <IconPlus /> Nova Solicitação
                  </button>
                </div>
              </div>

              {/* Tabela Scrollável */}
              <div className="overflow-x-auto">
                <table className="w-full text-left border-collapse min-w-[1300px]">
                  <thead>
                    <tr className="bg-white border-b-2 border-gray-200">
                      <th className="p-4 text-xs font-bold text-gray-600 uppercase tracking-wider w-64">Nome do Item</th>
                      <th className="p-4 text-xs font-bold text-gray-600 uppercase tracking-wider w-16 text-center">Qtd</th>
                      <th className="p-4 text-xs font-bold text-gray-600 uppercase tracking-wider w-32">Urgente (Motivo)</th>
                      <th className="p-4 text-xs font-bold text-gray-600 uppercase tracking-wider w-24">Data Solicit.</th>
                      
                      <th className={`p-4 text-xs font-bold uppercase tracking-wider w-32 border-l transition-colors ${role === 'ADM' ? 'bg-blue-50 text-[#0B4EA2] border-blue-200' : 'text-gray-600 border-gray-200'}`}>SC (ADM)</th>
                      <th className={`p-4 text-xs font-bold uppercase tracking-wider w-40 transition-colors ${role === 'ADM' ? 'bg-blue-50 text-[#0B4EA2]' : 'text-gray-600'}`}>Status (ADM)</th>
                      
                      <th className="p-4 text-xs font-bold text-gray-600 uppercase tracking-wider w-24 border-l border-gray-200">Última Atualiz.</th>
                      <th className="p-4 text-xs font-bold text-gray-600 uppercase tracking-wider w-32">Solicitado por</th>
                      <th className="p-4 text-xs font-bold text-gray-600 uppercase tracking-wider text-center w-24">Concluído</th>
                      <th className="p-4 text-xs font-bold text-gray-600 uppercase tracking-wider text-center w-24 sticky right-0 bg-white shadow-[-4px_0_6px_-2px_rgba(0,0,0,0.05)] border-l">Ações</th>
                    </tr>
                  </thead>
                  <tbody className="divide-y divide-gray-100">
                    
                    {/* Linha Nova Solicitação */}
                    {editingId === 'new' && (
                      <tr className="bg-blue-50/50">
                        <td className="p-2 pl-4">{renderCell({id: 'new'}, 'item', 'Ex: Pipeta')}</td>
                        <td className="p-2">{renderCell({id: 'new'}, 'quantidade', 'Ex: 2')}</td>
                        <td className="p-2">{renderCell({id: 'new'}, 'urgente', 'Sim/Não/Motivo')}</td>
                        <td className="p-2">{renderCell({id: 'new'}, 'dataSolicitacao', '', 'date')}</td>
                        <td className={`p-2 border-l ${role === 'ADM' ? 'bg-blue-100/40 border-blue-200' : 'border-gray-200'}`}>{renderCell({id: 'new'}, 'sc', 'Nº SC')}</td>
                        <td className={`p-2 ${role === 'ADM' ? 'bg-blue-100/40' : ''}`}>{renderCell({id: 'new'}, 'status', 'Status atual')}</td>
                        <td className="p-2 border-l border-gray-200">{renderCell({id: 'new'}, 'ultimaAtualizacao', '', 'date')}</td>
                        <td className="p-2">{renderCell({id: 'new'}, 'solicitante', 'Nome')}</td>
                        <td className="p-2">{renderCell({id: 'new'}, 'concluido')}</td>
                        <td className="p-2 sticky right-0 bg-blue-50/50 border-l border-gray-200">
                          <div className="flex items-center justify-center gap-2">
                            <button onClick={handleSave} className="p-2 bg-green-500 text-white rounded hover:bg-green-600 shadow-sm" title="Salvar"><IconSave /></button>
                            <button onClick={handleCancelEdit} className="p-2 bg-gray-300 text-gray-700 rounded hover:bg-gray-400 shadow-sm" title="Cancelar"><IconX /></button>
                          </div>
                        </td>
                      </tr>
                    )}

                    {/* Linhas de Dados */}
                    {filteredData.length > 0 ? (
                      filteredData.map((row) => {
                        const isEditing = editingId === row.id;
                        return (
                        <tr key={row.id} className={`hover:bg-slate-50 transition-colors ${isEditing ? 'bg-blue-50/30' : ''}`}>
                          <td className="p-3 pl-4">{renderCell(row, 'item')}</td>
                          <td className="p-3 text-center">{renderCell(row, 'quantidade')}</td>
                          <td className="p-3">{renderCell(row, 'urgente')}</td>
                          <td className="p-3">{renderCell(row, 'dataSolicitacao', '', 'date')}</td>
                          <td className={`p-3 border-l ${role === 'ADM' && !isEditing ? 'bg-blue-50/40 border-blue-100' : 'border-gray-100'}`}>{renderCell(row, 'sc')}</td>
                          <td className={`p-3 ${role === 'ADM' && !isEditing ? 'bg-blue-50/40' : ''}`}>{renderCell(row, 'status')}</td>
                          <td className="p-3 border-l border-gray-100">{renderCell(row, 'ultimaAtualizacao', '', 'date')}</td>
                          <td className="p-3">{renderCell(row, 'solicitante')}</td>
                          <td className="p-3 text-center">{renderCell(row, 'concluido')}</td>
                          <td className={`p-3 sticky right-0 border-l border-gray-100 ${isEditing ? 'bg-blue-50/30' : 'bg-white group-hover:bg-slate-50'} shadow-[-4px_0_6px_-2px_rgba(0,0,0,0.02)]`}>
                            <div className="flex items-center justify-center gap-2">
                              {isEditing ? (
                                <>
                                  <button onClick={handleSave} className="p-1.5 bg-green-500 text-white rounded hover:bg-green-600 shadow-sm transition" title="Salvar"><IconSave /></button>
                                  <button onClick={handleCancelEdit} className="p-1.5 bg-gray-300 text-gray-700 rounded hover:bg-gray-400 transition" title="Cancelar"><IconX /></button>
                                </>
                              ) : (
                                <>
                                  <button onClick={() => handleEdit(row)} className="p-1.5 text-[#0B4EA2] bg-blue-50 hover:bg-blue-100 rounded transition" title="Editar"><IconEdit /></button>
                                  <button onClick={() => handleDelete(row.id)} className="p-1.5 text-red-500 bg-red-50 hover:bg-red-100 rounded transition" title="Excluir"><IconTrash /></button>
                                </>
                              )}
                            </div>
                          </td>
                        </tr>
                      )})
                    ) : (
                      <tr>
                        <td colSpan="10" className="p-12 text-center text-gray-500 bg-gray-50/50">
                          {editingId !== 'new' && (
                             <div className="flex flex-col items-center justify-center">
                               <div className="text-gray-300 mb-4 scale-150"><IconSearch /></div>
                               <p className="text-xl font-bold text-gray-700">Nenhum registro encontrado</p>
                               <p className="text-sm mt-1 text-gray-500">Busque por outro termo ou adicione uma nova solicitação.</p>
                             </div>
                          )}
                        </td>
                      </tr>
                    )}
                  </tbody>
                </table>
              </div>
            </div>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
