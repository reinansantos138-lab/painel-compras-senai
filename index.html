<body>

  <script type="text/babel">
    const { useState, useEffect } = React;

    // ==========================================

    const firebaseConfig = {
      apiKey: "AIzaSyDAatI6cfnE-zfSpk8Pgp7AuH-oTd5Dk70",

    if (!firebase.apps.length) {
      firebase.initializeApp(firebaseConfig);

    const db = firebase.firestore();

    // ==========================================
    // ÍCONES SVG
    // ==========================================
    const IconSearch = () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>;
    const IconPlus = () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>;
    const IconEdit = () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg>;

    const IconTrash = () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2-2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>;

    const IconAlertCircle = () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg>;
    const IconLock = () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>;
    const IconUser = () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>;
    const IconDownload = () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>;
    
    // Ícones dos Setores
    const IconFlask = () => <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M9 3h6"></path><path d="M10 3v4.36L5.23 18.06A2 2 0 0 0 6.96 21h10.08a2 2 0 0 0 1.73-2.94L14 7.36V3"></path><path d="M5 14h14"></path></svg>;
    const IconMicroscope = () => <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M6 18h8"></path><path d="M3 22h18"></path><path d="M14 22a7 7 0 1 0 0-14h-1"></path><path d="M9 14h2"></path><path d="M9 12a2 2 0 0 1-2-2V6h6v4a2 2 0 0 1-2 2Z"></path><path d="M12 6V3a1 1 0 0 0-1-1H9a1 1 0 0 0-1 1v3"></path></svg>;
    const IconBeaker = () => <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M4.5 3h15"></path><path d="M6 3v16a2 2 0 0 0 2 2h8a2 2 0 0 0 2-2V3"></path><path d="M6 14h12"></path></svg>;
    const IconBox = () => <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path><polyline points="3.27 6.96 12 12.01 20.73 6.96"></polyline><line x1="12" y1="22.08" x2="12" y2="12"></line></svg>;
    const IconActivity = () => <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"></polyline></svg>;
    const IconClipboard = () => <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"></path><rect x="8" y="2" width="8" height="4" rx="1" ry="1"></rect></svg>;
    const IconDroplet = () => <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 2.69l5.66 5.66a8 8 0 1 1-11.31 0z"></path></svg>;

    const SenaiCimatecLogo = () => (
      <div className="flex justify-start items-center">
        <svg width="200" height="60" viewBox="0 0 200 60" fill="none" xmlns="http://www.w3.org/2000/svg">
          <g fill="#0B4EA2" style={{ fontFamily: 'system-ui, -apple-system, sans-serif', transform: 'skewX(-6deg)', transformOrigin: 'bottom left' }}>
            <text x="5" y="22" fontSize="15" fontWeight="800" letterSpacing="1.5">SENAI</text>
            <text x="4" y="52" fontSize="34" fontWeight="900" letterSpacing="0.5">CIMATEC</text>
          </g>
        </svg>
      </div>
    );

    // ==========================================
    // DADOS MOCK (Exemplos Preenchidos)
    // ==========================================
    const initialMockData = [
      { id: 'mock-1', setor: 'ESP', item: 'Aquisição Nebulizadores alto STD', quantidade: '3', urgente: 'Não', dataSolicitacao: '2025-09-17', sc: 'SC 0208-10/2025', status: 'Aprovação/Homologação', ultimaAtualizacao: '2025-11-11', solicitante: 'Sheyla', concluido: 'N', isMock: true },
      { id: 'mock-2', setor: 'ESP', item: 'Aquisição Termo-higrômetro', quantidade: '4', urgente: 'Sim - AUDITORIA', dataSolicitacao: '2025-09-18', sc: 'SC 0209-10/2025', status: 'Contrato Ativo', ultimaAtualizacao: '2025-11-11', solicitante: 'Sheyla', concluido: 'S', isMock: true },
      { id: 'mock-3', setor: 'MIC', item: 'Ágar MEI- Aquisição', quantidade: 'NA', urgente: 'SIM', dataSolicitacao: '2025-08-10', sc: '', status: 'Aguardando ADM', ultimaAtualizacao: '', solicitante: 'Alex', concluido: 'N', isMock: true },
      { id: 'mock-4', setor: 'QGI', item: 'Solução padrão de condutividade (5,0 µS/cm)', quantidade: '1', urgente: 'Auditoria', dataSolicitacao: '2025-01-24', sc: 'Aguardando SEDE', status: 'Em cadastro', ultimaAtualizacao: '2025-12-08', solicitante: 'Equipe QGI', concluido: 'N', isMock: true },
      { id: 'mock-5', setor: 'CRO', item: 'Coluna HPLC C18 (Análise Orgânica)', quantidade: '2', urgente: 'Sim', dataSolicitacao: '2025-10-10', sc: 'SC 0300-11/2025', status: 'Em cotação', ultimaAtualizacao: '2025-10-15', solicitante: 'Técnico CRO', concluido: 'N', isMock: true },
      { id: 'mock-6', setor: 'CRO', item: 'Padrão de Benzeno (Cromatografia Gasosa)', quantidade: '1', urgente: 'Não', dataSolicitacao: '2025-11-05', sc: '', status: 'Novo', ultimaAtualizacao: '', solicitante: 'Técnico CRO', concluido: 'N', isMock: true },
      { id: 'mock-7', setor: 'AMOSTRAGEM', item: 'Frascos de Coleta de Água 500ml', quantidade: '200', urgente: 'Sim - Demanda Alta', dataSolicitacao: '2025-12-01', sc: 'SC 0350-12/2025', status: 'Aprovado', ultimaAtualizacao: '2025-12-05', solicitante: 'Equipe Campo', concluido: 'P', isMock: true },
      { id: 'mock-8', setor: 'FQA', item: 'Reagentes Físico-Química Geral', quantidade: '5', urgente: 'Não', dataSolicitacao: '2025-09-20', sc: 'SC 0210-10/2025', status: 'Concluído', ultimaAtualizacao: '2025-10-01', solicitante: 'Analista FQA', concluido: 'S', isMock: true },
      { id: 'mock-9', setor: 'RECEPCAO', item: 'Etiquetas com Código de Barras', quantidade: '10', urgente: 'Sim', dataSolicitacao: '2025-11-20', sc: 'SC 0320-11/2025', status: 'Contrato Ativo', ultimaAtualizacao: '2025-11-25', solicitante: 'Atendimento', concluido: 'N', isMock: true },
      { id: 'mock-10', setor: 'PREPARACAO', item: 'Ácido Nítrico para Lavagem', quantidade: '4', urgente: 'Não', dataSolicitacao: '2025-10-30', sc: 'SC 0290-11/2025', status: 'Aprovação/Homologação', ultimaAtualizacao: '2025-11-02', solicitante: 'Técnico Preparo', concluido: 'N', isMock: true }
    ];

    function App() {
      // Estado principal que guarda os dados do Firebase
      const [firebaseData, setFirebaseData] = useState({ QGI: [], FQA: [], CRO: [], ESP: [], MIC: [], AMOSTRAGEM: [], RECEPCAO: [], PREPARACAO: [] });
      // Controla quais mocks o usuário escondeu ou transformou em real
      const [hiddenMocks, setHiddenMocks] = useState([]);

      const [activeSector, setActiveSector] = useState('QGI');
      const [editingId, setEditingId] = useState(null);
      const [editFormData, setEditFormData] = useState({});
      const [searchTerm, setSearchTerm] = useState('');
      const [isConnecting, setIsConnecting] = useState(true);
      const [dbError, setDbError] = useState('');
      
      const [role, setRole] = useState('Tecnico');
      const [showAuthModal, setShowAuthModal] = useState(false);
      const [authPassword, setAuthPassword] = useState('');
      const [authError, setAuthError] = useState('');

      // ==========================================
      // DEFINIÇÃO DOS SETORES E IMAGENS DOS CARDS
      // ==========================================
      const sectors = [
        { id: 'QGI', name: 'QGI', fullName: 'Química Geral e Inorgânica', icon: <IconBeaker />, img: 'https://images.unsplash.com/photo-1532094349884-543bc11b234d?auto=format&fit=crop&w=600&q=80' },
        { id: 'FQA', name: 'FQA', fullName: 'Físico-Química de Alimentos', icon: <IconFlask />, img: 'https://images.unsplash.com/photo-1579113800032-c38bd7635818?auto=format&fit=crop&w=600&q=80' },
        { id: 'CRO', name: 'CRO', fullName: 'Cromatografia (Orgânica, Gasosa, HPLC)', icon: <IconActivity />, img: 'https://images.unsplash.com/photo-1581093806997-124204d9fa9d?auto=format&fit=crop&w=600&q=80' },
        { id: 'ESP', name: 'ESP', fullName: 'Espectrografia', icon: <IconDroplet />, img: 'https://images.unsplash.com/photo-1614935151651-0bea6508db6b?auto=format&fit=crop&w=600&q=80' },
        { id: 'MIC', name: 'MIC', fullName: 'Microbiologia', icon: <IconMicroscope />, img: 'https://images.unsplash.com/photo-1576086213369-97a306d36557?auto=format&fit=crop&w=600&q=80' },
        { id: 'AMOSTRAGEM', name: 'AMOSTRAGEM', fullName: 'Coleta de Água', icon: <IconBox />, img: 'https://images.unsplash.com/photo-1542361345-89e58247f2d5?auto=format&fit=crop&w=600&q=80' },
        { id: 'RECEPCAO', name: 'RECEPÇÃO', fullName: 'Recepção de Amostras', icon: <IconClipboard />, img: 'https://images.unsplash.com/photo-1497366216548-37526070297c?auto=format&fit=crop&w=600&q=80' },
        { id: 'PREPARACAO', name: 'PREPARAÇÃO', fullName: 'Preparo de Frascos', icon: <IconFlask />, img: 'https://images.unsplash.com/photo-1581093458791-9f3c3900df4b?auto=format&fit=crop&w=600&q=80' }
      ];

      // ==========================================
      // FIREBASE & AUTENTICAÇÃO
      // ==========================================
      useEffect(() => {
        auth.signInAnonymously()
          .then(() => {
            db.collection('solicitacoes').onSnapshot(
              (snapshot) => {
                const newData = { QGI: [], FQA: [], CRO: [], ESP: [], MIC: [], AMOSTRAGEM: [], RECEPCAO: [], PREPARACAO: [] };
                
                snapshot.forEach(doc => {
                  const item = { id: doc.id, ...doc.data() };
                  if (newData[item.setor]) {
                    newData[item.setor].push(item);
                  } else if (item.setor === 'RECEPÇÃO') {
                     newData['RECEPCAO'].push(item);
                  } else if (item.setor === 'PREPARAÇÃO') {
                     newData['PREPARACAO'].push(item);
                  }
                });

                setFirebaseData(newData);
                setIsConnecting(false);
              },
              (error) => {
                console.error("Erro no Firestore:", error);
                setDbError("Sem permissão para ler os dados.");
                setIsConnecting(false);
              }
            );
          })
          .catch(() => {
            setDbError("Erro de conexão.");
            setIsConnecting(false);
          });
      }, []);

      // Combina os Mocks com os dados reais do Firebase de forma transparente para o usuário
      const getCombinedDataForSector = (sectorId) => {
        // Pega os mocks que ainda não foram convertidos/deletados
        const sectorMocks = initialMockData.filter(m => m.setor === sectorId && !hiddenMocks.includes(m.id));
        const sectorFirebase = firebaseData[sectorId] || [];
        
        // Combina e ordena por data (mais recente primeiro)
        return [...sectorMocks, ...sectorFirebase].sort((a, b) => new Date(b.dataSolicitacao) - new Date(a.dataSolicitacao));
      };

      const handleRoleChangeRequest = (newRole) => {
        if (newRole === 'ADM' && role !== 'ADM') {
          setShowAuthModal(true); setAuthPassword(''); setAuthError('');
        } else {
          setRole('Tecnico');
        }
      };

      const authenticateAdm = () => {
        if (authPassword === 'adm2026') {
          setRole('ADM'); setShowAuthModal(false);
        } else {
          setAuthError('Senha incorreta!');
        }
      };

      // ==========================================
      // EXPORTAÇÃO PDF (Para ADM)
      // ==========================================
      const exportToPDF = () => {
        const doc = new window.jspdf.jsPDF('landscape');
        const sectorInfo = sectors.find(s => s.id === activeSector);
        const combinedSectorData = getCombinedDataForSector(activeSector);

        // Ordena por STATUS alfabeticamente
        const sortedData = [...combinedSectorData].sort((a, b) => {
           const statusA = (a.status || 'Z-Sem Status').toLowerCase();
           const statusB = (b.status || 'Z-Sem Status').toLowerCase();
           return statusA.localeCompare(statusB);
        });

        doc.setFontSize(18);
        doc.text(`Relatório de Solicitações - ${sectorInfo.fullName}`, 14, 15);
        doc.setFontSize(11);
        doc.setTextColor(100);
        doc.text(`Exportado em: ${new Date().toLocaleDateString('pt-BR')} | Ordenado por Status`, 14, 22);

        const tableColumn = ["Status", "SC", "Item", "Qtd", "Urgente", "Solicitado por", "Data", "Concluído"];
        const tableRows = [];

        sortedData.forEach(item => {
          tableRows.push([
            item.status || '-',
            item.sc || '-',
            item.item || '-',
            item.quantidade || '-',
            item.urgente || '-',
            item.solicitante || '-',
            item.dataSolicitacao ? new Date(item.dataSolicitacao).toLocaleDateString('pt-BR') : '-',
            item.concluido === 'S' ? 'Sim' : item.concluido === 'P' ? 'Parcial' : 'Não'
          ]);
        });

        doc.autoTable({
          head: [tableColumn],
          body: tableRows,
          startY: 28,
          styles: { fontSize: 8, cellPadding: 2 },
          headStyles: { fillColor: [11, 78, 162] }, // Azul SENAI
          theme: 'grid'
        });

        doc.save(`Controle_Compras_${activeSector}_${new Date().getTime()}.pdf`);
      };

      // ==========================================
      // FUNÇÕES DA TABELA
      // ==========================================
      const handleEdit = (item) => { setEditingId(item.id); setEditFormData(item); };
      const handleCancelEdit = () => { setEditingId(null); setEditFormData({}); };
      const handleChange = (e) => { setEditFormData({ ...editFormData, [e.target.name]: e.target.value }); };

      const handleSave = async () => {
        const finalData = { ...editFormData };
        finalData.setor = activeSector; 
        
        const isMockItem = String(editingId).startsWith('mock-');
        
        delete finalData.id;
        delete finalData.isMock; // Garante que a flag mock não vá pro Firebase

        // Atualização da data para a ADM
        if (role === 'ADM') {
          if (!isMockItem && editingId !== 'new') {
             const currentItem = firebaseData[activeSector].find(i => i.id === editingId);
             if (currentItem && (currentItem.status !== finalData.status || currentItem.sc !== finalData.sc)) {
               finalData.ultimaAtualizacao = new Date().toISOString().split('T')[0];
             }
          } else {
             finalData.ultimaAtualizacao = new Date().toISOString().split('T')[0];
          }
        }

        try {
          if (editingId === 'new' || isMockItem) {
            // Se for Novo OU for um Exemplo Editado, cria um registro real no Firebase
            await db.collection('solicitacoes').add(finalData);
            
            // Oculta o Mock original para não aparecer duplicado
            if (isMockItem) {
               setHiddenMocks(prev => [...prev, editingId]);
            }
          } else {
            // Atualiza um registro que já existe no Firebase
            await db.collection('solicitacoes').doc(editingId).update(finalData);
          }
          setEditingId(null); setEditFormData({});
        } catch (error) { alert("Erro ao salvar no banco."); }
      };

      const handleDelete = async (id) => {
        if(window.confirm('Excluir esta solicitação permanentemente?')) {
          if (String(id).startsWith('mock-')) {
             // Apenas oculta o exemplo do painel
             setHiddenMocks(prev => [...prev, id]);
          } else {
             // Exclui real do Firebase
             await db.collection('solicitacoes').doc(id).delete();
          }
        }
      };

      const handleAddNew = () => {
        setEditingId('new');
        setEditFormData({ item: '', quantidade: '', urgente: 'Não', dataSolicitacao: new Date().toISOString().split('T')[0], sc: '', status: 'Novo', ultimaAtualizacao: '', solicitante: '', concluido: 'N' });
      };

      // Realiza o filtro no mix de dados Reais + Mocks
      const activeSectorData = getCombinedDataForSector(activeSector);
      const filteredData = activeSectorData.filter(item => 
        (item.item || '').toLowerCase().includes(searchTerm.toLowerCase()) ||
        (item.sc || '').toLowerCase().includes(searchTerm.toLowerCase()) ||
        (item.status || '').toLowerCase().includes(searchTerm.toLowerCase())
      );

      const renderCell = (item, fieldName, placeholder = '', type = 'text') => {
        const isEditing = editingId === item.id;
        const isAdmField = fieldName === 'sc' || fieldName === 'status' || fieldName === 'ultimaAtualizacao';
        const isHighlightAdm = isAdmField && role === 'ADM';
        
        if (isEditing) {
          const cellClass = `w-full text-sm border rounded p-1 focus:outline-none focus:ring-2 ${isHighlightAdm ? 'bg-blue-50 border-blue-400 focus:ring-blue-500' : 'border-gray-300 focus:ring-[#0B4EA2]'}`;
          if (fieldName === 'concluido') return (
            <select name={fieldName} value={editFormData[fieldName] || ''} onChange={handleChange} className={cellClass}>
              <option value="N">Não</option><option value="S">Sim</option><option value="P">Parcial</option><option value="NA">N/A</option>
            </select>
          );
          return <input type={type} name={fieldName} value={editFormData[fieldName] || ''} onChange={handleChange} placeholder={placeholder} className={cellClass} />;
        }

        let value = item[fieldName];
        if (fieldName === 'status') {
          const statusText = (value || '').toLowerCase();
          const statusColor = statusText.includes('concluído') || statusText.includes('ativo') ? 'bg-green-100 text-green-800 border-green-200' : 
                              statusText.includes('aprovação') || statusText.includes('aguardando') || statusText.includes('cotação') || statusText.includes('novo') ? 'bg-yellow-100 text-yellow-800 border-yellow-200' : 
                              'bg-gray-100 text-gray-800 border-gray-200';
          return <span className={`px-2 py-1 rounded-md border text-xs font-semibold ${statusColor}`}>{value || '-'}</span>;
        }
        if (fieldName === 'sc') return <span className="font-bold text-[#0B4EA2]">{value || '-'}</span>;
        if (fieldName === 'concluido') return value?.startsWith('S') ? <div className="flex justify-center text-green-600"><IconCheckCircle /></div> : value?.startsWith('P') ? <div className="flex justify-center text-yellow-500"><IconAlertCircle /></div> : <span className="text-gray-400 font-bold mx-auto block text-center">{value || 'N'}</span>;
        return <span className="text-sm text-gray-800">{value || '-'}</span>;
      };

      return (
        <div className="flex flex-col min-h-screen bg-[#f8fafc] font-sans relative">
          
          {/* Modal Autenticação */}
          {showAuthModal && (
            <div className="fixed inset-0 bg-black/60 backdrop-blur-sm flex items-center justify-center z-50 p-4">
              <div className="bg-white rounded-xl shadow-2xl p-6 w-full max-w-sm">
                <div className="flex items-center gap-3 text-[#0B4EA2] mb-4 border-b pb-3"><IconLock /><h3 className="text-lg font-bold">Acesso ADM</h3></div>
                <input type="password" placeholder="Senha" value={authPassword} onChange={(e) => setAuthPassword(e.target.value)} onKeyDown={(e) => e.key === 'Enter' && authenticateAdm()} className="w-full border rounded-lg px-4 py-2 focus:ring-2 focus:ring-[#0B4EA2] mb-2" />
                {authError && <p className="text-red-500 text-xs font-semibold mb-3">{authError}</p>}
                <div className="flex justify-end gap-2 mt-4">
                  <button onClick={() => setShowAuthModal(false)} className="px-4 py-2 bg-gray-100 hover:bg-gray-200 rounded-lg text-sm font-medium">Cancelar</button>
                  <button onClick={authenticateAdm} className="px-4 py-2 bg-[#0B4EA2] text-white hover:bg-blue-800 rounded-lg text-sm font-bold">Entrar</button>
                </div>
              </div>
            </div>
          )}

          {/* Cabeçalho */}
          <header className="bg-white shadow-sm border-b border-gray-200 px-6 py-3 flex items-center justify-between sticky top-0 z-30">
            <SenaiCimatecLogo />
            <div className="flex items-center gap-4">
              <div className="hidden sm:flex items-center gap-2">
                 {isConnecting ? <><div className="loader w-4 h-4 border-2"></div><span className="text-xs text-blue-600 font-bold">Conectando...</span></> : 
                  dbError ? <><span className="w-2 h-2 rounded-full bg-red-500 animate-pulse"></span><span className="text-xs text-red-600 font-bold">{dbError}</span></> : 
                  <><span className="w-2 h-2 rounded-full bg-green-500"></span><span className="text-xs text-green-600 font-bold">Online</span></>}
              </div>
              <div className="flex items-center bg-gray-100 p-1 rounded-lg border border-gray-200">
                <button onClick={() => handleRoleChangeRequest('Tecnico')} className={`flex items-center gap-2 px-4 py-2 text-sm font-bold rounded-md transition ${role === 'Tecnico' ? 'bg-white shadow-sm text-gray-800' : 'text-gray-500 hover:text-gray-700'}`}><IconUser /> Técnico</button>
                <button onClick={() => handleRoleChangeRequest('ADM')} className={`flex items-center gap-2 px-4 py-2 text-sm font-bold rounded-md transition ${role === 'ADM' ? 'bg-[#0B4EA2] text-white shadow-md' : 'text-gray-500 hover:text-gray-700'}`}><IconLock /> ADM</button>
              </div>
            </div>
          </header>

          <div className="flex-1 flex flex-col p-6 max-w-[1400px] mx-auto w-full">
            
            {/* Cards Centrais com Imagem de Fundo */}
            <div className="mb-8">
              <div className="grid grid-cols-2 md:grid-cols-4 gap-4">
                {sectors.map(sector => {
                  const isActive = activeSector === sector.id;
                  const requestCount = getCombinedDataForSector(sector.id).length;

                  return (
                    <div 
                      key={sector.id}
                      onClick={() => { setActiveSector(sector.id); setEditingId(null); }}
                      className={`relative cursor-pointer rounded-2xl overflow-hidden transition-all duration-300 transform hover:-translate-y-1 shadow-sm ${isActive ? 'ring-4 ring-[#0B4EA2] shadow-xl scale-[1.02]' : 'hover:shadow-lg opacity-90 hover:opacity-100'}`}
                      style={{ minHeight: '140px' }}
                    >
                      {/* Imagem de Fundo */}
                      <div className="absolute inset-0 bg-cover bg-center" style={{ backgroundImage: `url(${sector.img})` }}></div>
                      
                      {/* Overlay Escuro para Legibilidade */}
                      <div className={`absolute inset-0 transition-colors ${isActive ? 'bg-[#0B4EA2]/80 mix-blend-multiply' : 'bg-slate-900/70'}`}></div>
                      
                      {/* Conteúdo do Card */}
                      <div className="relative z-10 p-4 h-full flex flex-col items-center justify-center text-center text-white">
                        <div className={`mb-2 p-2 rounded-full ${isActive ? 'bg-white/20 text-white' : 'bg-white/10 text-gray-200'}`}>
                          {sector.icon}
                        </div>
                        <h3 className="text-xl font-black tracking-wider leading-none">{sector.name}</h3>
                        <p className="text-[10px] uppercase font-semibold mt-1 opacity-80 tracking-widest leading-tight">{sector.fullName}</p>
                        
                        <div className="absolute top-2 right-2 bg-black/50 px-2 py-0.5 rounded-full text-[10px] font-bold">
                           {requestCount}
                        </div>
                      </div>
                    </div>
                  );
                })}
              </div>
            </div>

            {/* Tabela */}
            <div className="bg-white rounded-xl shadow-md border border-gray-200 overflow-hidden flex flex-col flex-1">
              <div className="p-4 border-b border-gray-200 bg-gray-50 flex flex-col sm:flex-row items-center justify-between gap-4">
                <div>
                  <h3 className="text-lg font-bold text-gray-800">Planilha de Pedidos</h3>
                  <p className="text-sm text-[#0B4EA2] font-semibold">{sectors.find(s=>s.id === activeSector)?.fullName}</p>
                </div>
                
                <div className="flex items-center gap-3 w-full sm:w-auto overflow-x-auto">
                  
                  {/* Botão de Exportar PDF exclusivo para ADM */}
                  {role === 'ADM' && (
                    <button 
                      onClick={exportToPDF}
                      className="bg-red-600 hover:bg-red-700 text-white px-4 py-2 rounded-lg flex items-center gap-2 text-sm font-bold transition shadow-sm whitespace-nowrap"
                    >
                      <IconDownload /> Exportar PDF
                    </button>
                  )}

                  <div className="relative">
                    <div className="absolute left-3 top-1/2 transform -translate-y-1/2 text-gray-400"><IconSearch /></div>
                    <input type="text" placeholder="Buscar..." value={searchTerm} onChange={(e) => setSearchTerm(e.target.value)} className="pl-9 pr-4 py-2 w-48 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-[#0B4EA2]" />
                  </div>
                  
                  <button onClick={handleAddNew} disabled={editingId === 'new' || isConnecting || dbError} className="bg-[#0B4EA2] hover:bg-blue-800 disabled:bg-gray-300 text-white px-4 py-2 rounded-lg flex items-center gap-2 text-sm font-bold transition shadow-sm whitespace-nowrap">
                    <IconPlus /> Solicitação
                  </button>
                </div>
              </div>

              <div className="overflow-x-auto">
                <table className="w-full text-left border-collapse min-w-[1300px]">
                  <thead>
                    <tr className="bg-white border-b-2 border-gray-200">
                      <th className="p-3 text-xs font-bold text-gray-600 uppercase tracking-wider w-64">Nome do Item</th>
                      <th className="p-3 text-xs font-bold text-gray-600 uppercase tracking-wider w-16 text-center">Qtd</th>
                      <th className="p-3 text-xs font-bold text-gray-600 uppercase tracking-wider w-32">Urgente (Motivo)</th>
                      <th className="p-3 text-xs font-bold text-gray-600 uppercase tracking-wider w-24">Data Solicit.</th>
                      <th className={`p-3 text-xs font-bold uppercase tracking-wider w-32 border-l transition-colors ${role === 'ADM' ? 'bg-blue-50 text-[#0B4EA2] border-blue-200' : 'text-gray-600 border-gray-200'}`}>SC (ADM)</th>
                      <th className={`p-3 text-xs font-bold uppercase tracking-wider w-40 transition-colors ${role === 'ADM' ? 'bg-blue-50 text-[#0B4EA2]' : 'text-gray-600'}`}>Status (ADM)</th>
                      <th className="p-3 text-xs font-bold text-gray-600 uppercase tracking-wider w-24 border-l border-gray-200">Atualiz.</th>
                      <th className="p-3 text-xs font-bold text-gray-600 uppercase tracking-wider w-24">Solicitante</th>
                      <th className="p-3 text-xs font-bold text-gray-600 uppercase tracking-wider text-center w-20">Concluído</th>
                      <th className="p-3 text-xs font-bold text-gray-600 uppercase tracking-wider text-center w-20 sticky right-0 bg-white shadow-[-4px_0_6px_-2px_rgba(0,0,0,0.05)] border-l">Ações</th>
                    </tr>
                  </thead>
                  <tbody className="divide-y divide-gray-100">
                    
                    {editingId === 'new' && (
                      <tr className="bg-blue-50/50">
                        <td className="p-2 pl-3">{renderCell({id: 'new'}, 'item', 'Ex: Pipeta')}</td>
                        <td className="p-2">{renderCell({id: 'new'}, 'quantidade', 'Ex: 2')}</td>
                        <td className="p-2">{renderCell({id: 'new'}, 'urgente', 'Sim/Não')}</td>
                        <td className="p-2">{renderCell({id: 'new'}, 'dataSolicitacao', '', 'date')}</td>
                        <td className={`p-2 border-l ${role === 'ADM' ? 'bg-blue-100/40 border-blue-200' : 'border-gray-200'}`}>{renderCell({id: 'new'}, 'sc', 'Nº SC')}</td>
                        <td className={`p-2 ${role === 'ADM' ? 'bg-blue-100/40' : ''}`}>{renderCell({id: 'new'}, 'status', 'Status')}</td>
                        <td className="p-2 border-l border-gray-200">{renderCell({id: 'new'}, 'ultimaAtualizacao', '', 'date')}</td>
                        <td className="p-2">{renderCell({id: 'new'}, 'solicitante', 'Nome')}</td>
                        <td className="p-2">{renderCell({id: 'new'}, 'concluido')}</td>
                        <td className="p-2 sticky right-0 bg-blue-50/50 border-l border-gray-200">
                          <div className="flex items-center justify-center gap-1.5">
                            <button onClick={handleSave} className="p-1.5 bg-green-500 text-white rounded hover:bg-green-600 shadow-sm" title="Salvar"><IconSave /></button>
                            <button onClick={handleCancelEdit} className="p-1.5 bg-gray-300 text-gray-700 rounded hover:bg-gray-400 shadow-sm" title="Cancelar"><IconX /></button>
                          </div>
                        </td>
                      </tr>
                    )}

                    {filteredData.length > 0 ? (
                      filteredData.map((row) => {
                        const isEditing = editingId === row.id;
                        return (
                        <tr key={row.id} className={`hover:bg-slate-50 transition-colors ${isEditing ? 'bg-blue-50/30' : ''}`}>
                          <td className="p-2.5 pl-3">{renderCell(row, 'item')}</td>
                          <td className="p-2.5 text-center">{renderCell(row, 'quantidade')}</td>
                          <td className="p-2.5">{renderCell(row, 'urgente')}</td>
                          <td className="p-2.5">{renderCell(row, 'dataSolicitacao', '', 'date')}</td>
                          <td className={`p-2.5 border-l ${role === 'ADM' && !isEditing ? 'bg-blue-50/40 border-blue-100' : 'border-gray-100'}`}>{renderCell(row, 'sc')}</td>
                          <td className={`p-2.5 ${role === 'ADM' && !isEditing ? 'bg-blue-50/40' : ''}`}>{renderCell(row, 'status')}</td>
                          <td className="p-2.5 border-l border-gray-100">{renderCell(row, 'ultimaAtualizacao', '', 'date')}</td>
                          <td className="p-2.5">{renderCell(row, 'solicitante')}</td>
                          <td className="p-2.5 text-center">{renderCell(row, 'concluido')}</td>
                          <td className={`p-2.5 sticky right-0 border-l border-gray-100 ${isEditing ? 'bg-blue-50/30' : 'bg-white group-hover:bg-slate-50'}`}>
                            <div className="flex items-center justify-center gap-1.5">
                              {isEditing ? (
                                <>
                                  <button onClick={handleSave} className="p-1.5 bg-green-500 text-white rounded hover:bg-green-600"><IconSave /></button>
                                  <button onClick={handleCancelEdit} className="p-1.5 bg-gray-300 text-gray-700 rounded hover:bg-gray-400"><IconX /></button>
                                </>
                              ) : (
                                <>
                                  <button onClick={() => handleEdit(row)} className="p-1.5 text-[#0B4EA2] bg-blue-50 hover:bg-blue-100 rounded" title="Editar Solicitação"><IconEdit /></button>
                                  <button onClick={() => handleDelete(row.id)} className="p-1.5 text-red-500 bg-red-50 hover:bg-red-100 rounded" title="Excluir Solicitação"><IconTrash /></button>
                                </>
                              )}
                            </div>
                          </td>
                        </tr>
                      )})
                    ) : (
                      <tr>
                        <td colSpan="10" className="p-10 text-center text-gray-500 bg-gray-50/50">
                          {editingId !== 'new' && (
                             <div className="flex flex-col items-center justify-center">
                               {isConnecting ? (
                                  <><div className="loader w-8 h-8 mb-4 border-4"></div><p className="font-bold text-gray-700">Conectando...</p></>
                               ) : (
                                  <><div className="text-gray-300 mb-3 scale-125"><IconSearch /></div><p className="font-bold text-gray-700">Ainda não há solicitações neste setor</p></>
                               )}
                             </div>
                          )}
                        </td>
                      </tr>
                    )}
                  </tbody>
                </table>
              </div>
            </div>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
